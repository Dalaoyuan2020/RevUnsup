# PatchCore 默认配置（对齐旧版 anomalyDet）
model:
  name: PatchCore
  backbone: resnet18
  layers: [layer2, layer3]
  coreset_sampling_ratio: 0.1
  num_neighbors: 1

data:
  image_size: [256, 256]
  task: segmentation
  format: folder
  train_batch_size: 1
  test_batch_size: 1

deploy:
  input_size: [256, 256]
  onnx_opset: 14
  tensorrt_fp16: true
  max_batch_size: 1

thresholds:
  image_threshold: null
  pixel_threshold: null
