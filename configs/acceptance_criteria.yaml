# 验收标准（Harness 定义，Agent 不能修改）
# 每个 Agent 交付后，由 tests/test_agent*.py 自动验证

agent1_codex:
  description: "Python 训练流程"
  criteria:
    - name: "checkpoint 可加载"
      test: "加载 model.ckpt 不报错"
    - name: "thresholds.json 格式正确"
      test: "包含 image_threshold 和 pixel_threshold，均为正数"
    - name: "训练参数对齐旧版"
      test: "backbone==resnet18, image_size==256, coreset_ratio==0.1"
    - name: "验收集精度达标"
      test: "AUROC >= 0.90（在 data/acceptance/ 上）"
    - name: "OK/Bad 分数分离"
      test: "OK图 score 均值 < threshold, Bad图 score 均值 > threshold"

agent2_claude_code:
  description: "推理 + ONNX 导出"
  criteria:
    - name: "先验上游"
      test: "加载 Agent1 ckpt 跑 10 张图，score 合理"
    - name: "三个导出文件存在"
      test: "feature_extractor.onnx + memory_bank.npy + deploy_config.json"
    - name: "ONNX 可加载"
      test: "onnxruntime 加载，输入 shape (1,3,256,256)"
    - name: "Python vs ONNX 一致"
      test: "同一张图 score 差值 < 0.001"
    - name: "ONNX 推理精度达标"
      test: "AUROC >= 0.90"
    - name: "memory_bank shape 合理"
      test: "shape 为 (N, C), N > 0, C > 0"

agent3_opencode:
  description: "C++ 部署 + DLL"
  criteria:
    - name: "先验上游"
      test: "加载 ONNX 跑 10 张图，与 Python diff < 0.01"
    - name: "C++ 编译通过"
      test: "cmake --build 返回 0"
    - name: "DLL 可加载"
      test: "anomalyDet.dll 存在且可加载"
    - name: "C++ vs Python 一致"
      test: "score 差值 < 0.01"
    - name: "推理延迟达标"
      test: "10 张图平均 <= 100ms"
    - name: "分步耗时合理"
      test: "特征提取<50ms, KNN<40ms, 后处理<10ms"

integration:
  description: "全链路门禁"
  criteria:
    - name: "端到端 AUROC >= 0.90"
    - name: "C++ vs Python diff < 0.01"
    - name: "C++ 平均延迟 <= 100ms"
